<!--
  佐子の歌（Sachiko no Uta）—— 单文件 HTML 恐怖文字推理游戏
  文件：index.html
  运行方式：用现代浏览器（Chrome / Firefox / Edge / Safari 最新两版）直接双击打开，
           或在该文件所在目录启动本地静态服务器后访问。
  依赖：无。所有样式、脚本、音效均内联生成，离线可运行。
  说明：本文件为第一阶段的完整底层引擎与框架，包含后续剧本填充所需的全部接口。
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>佐子の歌</title>
  <style>
    :root {
      --bg: #050505;
      --fg: #e0e0e0;
      --dim: #999;
      --panel: #141414;
      --border: #333;
      --accent: #8B0000;
      --accent-dim: #4A0000;
      --font-stack: 'Noto Serif JP', 'Source Han Serif SC', 'SimSun', 'Songti SC', 'STSong', serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-stack);
      font-size: 16px;
      line-height: 1.75;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* 全屏视觉层 */
    #noise-overlay, #scanlines, #vignette, #snow-layer, #flash-layer, #curse-overlay, #edge-text {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #noise-overlay {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.06;
      animation: noiseFlicker 0.15s steps(4) infinite;
    }

    @keyframes noiseFlicker {
      0% { opacity: 0.05; }
      50% { opacity: 0.09; }
      100% { opacity: 0.05; }
    }

    #scanlines {
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0,
        rgba(0,0,0,0) 2px,
        rgba(255,255,255,0.03) 2px,
        rgba(255,255,255,0.03) 4px
      );
      animation: scanMove 8s linear infinite;
    }

    @keyframes scanMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 100vh; }
    }

    #vignette {
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    }

    #curse-overlay {
      background: radial-gradient(circle at center, rgba(139,0,0,0) 30%, rgba(139,0,0,0.35) 100%);
      opacity: 0;
      transition: opacity 1s;
      mix-blend-mode: multiply;
    }

    #edge-text {
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(139,0,0,0.25);
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1s;
    }

    .curse-active #edge-text {
      opacity: 1;
    }

    /* 雪花 */
    .snowflake {
      position: absolute;
      top: -10px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.7;
      pointer-events: none;
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes fall {
      0% { transform: translateY(0) translateX(0); opacity: 0.8; }
      100% { transform: translateY(110vh) translateX(20px); opacity: 0; }
    }

    /* 闪现元素 */
    .flash-element {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      animation: flashInOut 0.35s ease-in-out forwards;
    }

    @keyframes flashInOut {
      0% { opacity: 0; transform: scale(0.95); }
      20% { opacity: 0.9; }
      100% { opacity: 0; transform: scale(1.05); }
    }

    .half-shadow {
      width: 120px;
      height: 240px;
      right: 10%;
      bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 60%, transparent 100%);
      clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
      filter: blur(2px);
    }

    .train-light {
      width: 300px;
      height: 200px;
      left: -100px;
      top: 30%;
      background: radial-gradient(circle, rgba(255,240,200,0.6) 0%, transparent 70%);
      filter: blur(8px);
    }

    .handprint {
      width: 90px;
      height: 110px;
      color: var(--accent);
    }

    .silhouette {
      width: 150px;
      height: 300px;
      right: 8%;
      bottom: 0;
      filter: blur(1px);
    }

    /* 屏幕切换 */
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.7s ease;
      z-index: 20;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    .hidden { display: none !important; }

    /* 通用按钮 */
    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(20,20,20,0.9);
      color: var(--fg);
      font-family: inherit;
      font-size: 1rem;
      padding: 0.75rem 1.5rem;
      margin: 0.4rem;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 160px;
      text-align: center;
    }

    .btn:hover:not(:disabled) {
      border-color: var(--fg);
      background: #222;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-ghost { background: transparent; }
    .btn-danger { border-color: var(--accent); color: var(--accent); }
    .btn-danger:hover:not(:disabled) { background: var(--accent-dim); color: var(--fg); }

    /* 警告屏 */
    #warning-screen { z-index: 100; background: var(--bg); }
    .warning-box {
      max-width: 640px;
      text-align: center;
    }
    #warning-text {
      font-size: 1.15rem;
      line-height: 2;
      min-height: 8em;
      margin-bottom: 2rem;
      white-space: pre-wrap;
    }
    .blood-rule {
      color: var(--accent);
      font-weight: bold;
    }

    /* 结局屏 */
    #ending-screen { background: var(--bg); z-index: 90; }
    .ending-box {
      max-width: 560px;
      text-align: center;
      animation: endingFadeIn 1.2s ease forwards;
    }
    @keyframes endingFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #ending-label {
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 0.5em;
      margin-bottom: 1rem;
    }
    #ending-title {
      font-size: 2.2rem;
      margin: 0 0 1rem;
      text-shadow: 0 0 16px rgba(139,0,0,0.35);
    }
    #ending-desc {
      color: #aaa;
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    #ending-unlock {
      color: var(--accent);
      font-size: 0.85rem;
      margin-bottom: 2rem;
      min-height: 1.4em;
    }

    /* 主菜单 */
    #main-menu .menu-content { text-align: center; }
    .title {
      font-size: 3rem;
      letter-spacing: 0.5em;
      margin: 0 0 2rem;
      text-shadow: 0 0 12px rgba(139,0,0,0.4);
    }
    .subtitle { color: var(--dim); margin-bottom: 2rem; }
    .menu-buttons { display: flex; flex-direction: column; align-items: center; }

    /* 设置/模式选择 */
    .setup-panel, .panel, .gallery-content {
      width: 100%;
      max-width: 800px;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 1.5rem;
      max-height: 90vh;
      overflow-y: auto;
    }
    .section-title {
      color: var(--dim);
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      margin: 1.5rem 0 0.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.25rem;
    }
    .grid {
      display: grid;
      gap: 0.75rem;
    }
    .chars { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
    .modes { grid-template-columns: repeat(3, 1fr); }

    .card {
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.4);
      padding: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .card:hover:not(.locked) { border-color: var(--fg); }
    .card.selected { border-color: var(--accent); background: rgba(139,0,0,0.1); }
    .card.locked {
      opacity: 0.4;
      cursor: not-allowed;
      filter: grayscale(1);
    }
    .card-name { font-size: 1.1rem; margin-bottom: 0.25rem; }
    .card-role { color: var(--dim); font-size: 0.8rem; margin-bottom: 0.5rem; }
    .card-desc { color: #aaa; font-size: 0.75rem; line-height: 1.4; }

    .setup-actions {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }

    /* 游戏屏 */
    #game-screen {
      align-items: stretch;
      justify-content: flex-start;
      padding: 0;
    }

    #game-hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--dim);
      z-index: 30;
      gap: 1rem;
    }
    #hud-left, #hud-right { display: flex; align-items: center; gap: 0.8rem; flex-shrink: 0; }
    #hud-center { display: flex; align-items: center; gap: 1.2rem; flex-shrink: 1; }
    #hud-right span { white-space: nowrap; }
    .hud-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: inherit;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .hud-btn:hover { color: var(--fg); border-color: var(--fg); }

    #text-area {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.5rem 1rem;
      display: flex;
      justify-content: center;
    }
    #text-stack {
      width: 100%;
      max-width: 720px;
    }
    .text-line {
      margin: 0 0 1.2rem;
      font-size: 1.1rem;
      min-height: 1.6em;
    }
    .text-line:last-child { margin-bottom: 0; }

    #options-area {
      padding: 1rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      min-height: 120px;
    }
    .option-btn {
      width: 100%;
      text-align: left;
      margin: 0.35rem 0;
      border-left: 3px solid var(--border);
    }
    .option-btn:hover:not(:disabled) {
      border-left-color: var(--accent);
      padding-left: 1.7rem;
    }
    .option-btn:disabled { opacity: 0.3; }

    .choice-timer {
      width: 100%;
      height: 3px;
      background: var(--accent-dim);
      margin: 0.5rem 0 1rem;
      position: relative;
      overflow: hidden;
    }
    .choice-timer-bar {
      height: 100%;
      background: var(--accent);
      width: 100%;
      transform-origin: left;
      animation: timerShrink linear forwards;
    }
    @keyframes timerShrink {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }

    #skip-hint {
      position: absolute;
      bottom: 0.5rem;
      right: 1rem;
      color: var(--dim);
      font-size: 0.7rem;
      opacity: 0.6;
      pointer-events: none;
      z-index: 25;
    }

    /* 文字异常效果 */
    .blood { color: var(--accent); }
    .shake { animation: shake 0.25s infinite; display: inline-block; }
    .glitch { animation: glitch 0.8s infinite; display: inline-block; }
    .mirror { display: inline-block; transform: scaleX(-1); }
    .repeated { text-shadow: 2px 0 currentColor, -2px 0 currentColor; }
    .blocked {
      background: var(--bg);
      color: var(--bg);
      border-radius: 2px;
      padding: 0 0.15em;
    }
    .censor {
      background: #1a1a1a;
      color: transparent;
      text-shadow: 0 0 0 #1a1a1a;
      border-radius: 2px;
      padding: 0 0.15em;
      user-select: none;
    }
    .broken { letter-spacing: 0.15em; }
    .vertical-jp {
      display: inline-block;
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-size: 0.85em;
      letter-spacing: 0.3em;
      color: var(--dim);
      margin-left: 0.5em;
    }

    @keyframes shake {
      0% { transform: translate(0,0); }
      25% { transform: translate(-1px,1px); }
      50% { transform: translate(1px,-1px); }
      75% { transform: translate(-1px,-1px); }
      100% { transform: translate(0,0); }
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px,2px); }
      40% { transform: translate(2px,-2px); }
      60% { transform: translate(-2px,-1px); }
      80% { transform: translate(1px,1px); }
      100% { transform: translate(0); }
    }

    /* ===== 日本文化视觉样式 ===== */
    .jp-vertical-block {
      display: inline-block;
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-size: 1.2rem;
      letter-spacing: 0.4em;
      color: var(--dim);
      opacity: 0.35;
      padding: 0.5em 0.2em;
      border-left: 1px solid rgba(139,0,0,0.2);
      margin: 0 0.5em;
      line-height: 1.8;
    }
    .jp-brush {
      font-family: 'Noto Serif JP', 'Source Han Serif SC', 'SimSun', serif;
      font-size: 1.5em;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-shadow: 0 0 8px rgba(139,0,0,0.4), 2px 2px 0 rgba(0,0,0,0.8);
      display: block;
      text-align: center;
      margin: 0.5em 0;
    }
    .jp-furigana {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.2;
    }
    .jp-furigana .rt {
      font-size: 0.5em;
      color: var(--dim);
      opacity: 0.6;
      letter-spacing: 0.05em;
    }
    .jp-emaki {
      border: 1px solid var(--border);
      border-image: repeating-linear-gradient(
        45deg,
        var(--border) 0,
        var(--border) 2px,
        transparent 2px,
        transparent 6px
      ) 1;
      padding: 1.5rem;
      background: rgba(20,20,20,0.5);
    }
    .jp-washi {
      background:
        radial-gradient(ellipse at 30% 20%, rgba(255,248,235,0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(200,180,150,0.02) 0%, transparent 60%),
        var(--bg);
    }
    .jp-tatami {
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(100,130,80,0.04) 3px,
          rgba(100,130,80,0.04) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 8px,
          rgba(100,130,80,0.03) 8px,
          rgba(100,130,80,0.03) 9px
        ),
        var(--bg);
    }
    /* 鸟居 SVG 闪现 */
    .torii-flash {
      width: 180px;
      height: 240px;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      opacity: 0;
      animation: flashInOut 0.5s ease-in-out forwards;
    }
    /* 风铃 */
    .furin-flash {
      width: 60px;
      height: 100px;
      animation: furinSwing 0.6s ease-in-out forwards;
    }
    @keyframes furinSwing {
      0% { transform: rotate(-8deg); opacity: 0; }
      30% { transform: rotate(6deg); opacity: 0.7; }
      60% { transform: rotate(-4deg); opacity: 0.5; }
      100% { transform: rotate(0deg); opacity: 0; }
    }
    /* 和伞 */
    .wagasa-flash {
      width: 100px;
      height: 130px;
      animation: flashInOut 0.45s ease-in-out forwards;
    }
    /* 狐面 */
    .kitsune-flash {
      width: 80px;
      height: 90px;
      animation: flashInOut 0.4s ease-in-out forwards;
    }

    /* 屏幕震动 */
    .screen-shake {
      animation: screenShake 0.4s ease-in-out;
    }
    @keyframes screenShake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* 覆盖面板 */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay:not(.hidden) { opacity: 1; pointer-events: auto; }

    .panel label {
      display: block;
      margin: 1rem 0;
    }
    .panel input[type="range"] { width: 100%; }

    .clue-category { color: var(--dim); margin-top: 1rem; font-size: 0.85rem; }
    .clue-item { padding: 0.25rem 0; border-bottom: 1px solid #222; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
      gap: 0.75rem;
      margin: 1rem 0;
    }
    .gallery-card {
      border: 1px solid var(--border);
      padding: 0.75rem;
      text-align: center;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
    }
    .gallery-card.unlocked { color: var(--fg); border-color: var(--accent); }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; }

    @media (max-width: 600px) {
      .title { font-size: 2rem; letter-spacing: 0.3em; }
      .modes { grid-template-columns: 1fr; }
      .text-line { font-size: 1rem; }
      #game-hud { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="noise-overlay"></div>
    <div id="scanlines"></div>
    <div id="vignette"></div>
    <div id="snow-layer"></div>
    <div id="flash-layer"></div>
    <div id="curse-overlay"></div>
    <div id="edge-text">聞こえる…聞こえる…</div>
    <audio id="bgm-player" loop preload="auto" src="Gymnopédie No.1.mp3"></audio>

    <!-- 警告屏 -->
    <section id="warning-screen" class="screen active">
      <div class="warning-box">
        <div id="warning-text"></div>
        <div id="warning-actions" class="hidden">
          <button id="btn-continue" class="btn">我年满 18 岁，继续</button>
          <button id="btn-exit" class="btn btn-ghost">退出</button>
        </div>
      </div>
    </section>

    <!-- 主菜单 -->
    <section id="main-menu" class="screen">
      <div class="menu-content">
        <h1 class="title">佐子の歌</h1>
        <p class="subtitle">この歌を聞いた者は、佐子に憑かれる。</p>
        <div class="menu-buttons">
          <button id="btn-continue-save" class="btn hidden">继续游戏</button>
          <button id="btn-new-game" class="btn">开始游戏</button>
          <button id="btn-settings" class="btn btn-ghost">设置</button>
          <button id="btn-gallery" class="btn btn-ghost">收集图鉴</button>
          <button id="btn-delete-save" class="btn btn-danger hidden">删除所有存档</button>
        </div>
      </div>
    </section>

    <!-- 角色与模式选择 -->
    <section id="setup-screen" class="screen">
      <div id="setup-panel" class="setup-panel">
        <h2>选择你的角色与模式</h2>
        <div class="section-title">角色</div>
        <div id="char-grid" class="grid chars"></div>

        <div class="section-title">恐怖强度</div>
        <div id="intensity-grid" class="grid modes"></div>

        <div class="section-title">玩法模式</div>
        <div id="mode-grid" class="grid modes"></div>

        <div class="setup-actions">
          <button id="btn-setup-back" class="btn btn-ghost">返回</button>
          <button id="btn-start" class="btn" disabled>确认开始</button>
        </div>
      </div>
    </section>

    <!-- 游戏主屏 -->
    <section id="game-screen" class="screen">
      <div id="game-hud">
        <div id="hud-left">
          <span id="hud-char"></span>
          <span id="hud-chapter"></span>
        </div>
        <div id="hud-center">
          <span id="hud-sanity">理智: <b id="sanity-val">100</b></span>
          <span id="hud-curse">诅咒: <b id="curse-val">0</b></span>
        </div>
        <div id="hud-right">
          <button id="btn-clues" class="hud-btn hidden">线索</button>
          <button id="btn-game-settings" class="hud-btn">设置</button>
        </div>
      </div>
      <div id="text-area"><div id="text-stack"></div></div>
      <div id="options-area"></div>
      <div id="skip-hint" class="hidden">点击屏幕或按空格跳过当前段落</div>
    </section>

    <!-- 设置面板 -->
    <div id="settings-panel" class="overlay hidden">

  <script>

    const CLUE_TYPES = {

      environment: '环境',

    /* ============================================================
       状态
       ============================================================ */
    function defaultUnlocked() {
      return { routes: { sachiko: false }, endings: [], deaths: [], songVariants: [], archives: [], encounters: [], newGamePlus: false };
    }

    function defaultState() {
      const unlocked = loadUnlocked();
      return {
        character: null,
        intensity: 'narrative',
        mode: 'story',
        chapter: 1,
        clues: [],
        flags: {},
        sanity: 100,
        curse: 0,
        choices: [],
        runSeed: 0,
        newGamePlus: unlocked.newGamePlus,
        unlocked: unlocked
      };
    }

    let state = defaultState();
    let settings = loadSettings();
    let currentRoute = null;
    let currentNodeId = null;
    let pendingConfig = { char: null, intensity: 'narrative', mode: 'story' };

    // 文本引擎运行时
    let segmentQueue = [];
    let segmentIndex = 0;
    let typing = false;
    let typingTimer = null;
    let flashTimer = null;
    let snowTimer = null;
    let choiceTimer = null;

    /* ============================================================
       剧本节点（预留结构，当前为占位内容）
       ============================================================ */
    function addClue(st, type, name) {
      if (!st.clues.find(c => c.name === name)) {
        st.clues.push({ type, name, at: Date.now() });
      }
    }
    function setFlag(st, key, value) { st.flags[key] = value === undefined ? true : value; }
    function hasClue(st, name) { return st.clues.some(c => c.name === name); }

    function unlockEnding(name) {
      if (!state.unlocked.endings.includes(name)) {
        state.unlocked.endings.push(name);
        saveUnlocked();
      }
    }
    function unlockDeath(name) {
      if (!state.unlocked.deaths.includes(name)) {
        state.unlocked.deaths.push(name);
        saveUnlocked();
      }
    }
    function unlockSong(name) {
      if (!state.unlocked.songVariants.includes(name)) {
        state.unlocked.songVariants.push(name);
        saveUnlocked();
      }
    }
    function unlockArchive(name) {
      if (!state.unlocked.archives.includes(name)) {
        state.unlocked.archives.push(name);
        saveUnlocked();
      }
    }
    function unlockRoute(key) {
      state.unlocked.routes[key] = true;
      saveUnlocked();
    }
    function completeRoute(s) {
      if (s && s.character) {
        unlockRoute(s.character);
        state.unlocked.newGamePlus = true;
        saveUnlocked();
        const completed = Object.keys(state.unlocked.routes).filter(k => k !== 'sachiko' && state.unlocked.routes[k]).length;
        if (completed >= 2) unlockRoute('sachiko');
      }
    }
    function unlockEncounter(name) {
      if (!state.unlocked.encounters) state.unlocked.encounters = [];
      if (!state.unlocked.encounters.includes(name)) {
        state.unlocked.encounters.push(name);
        saveUnlocked();
      }
    }
    function randomEvent(s, eventKey, n) {
      n = n || 2;
      if (!s.runSeed) s.runSeed = Date.now() + Math.floor(Math.random() * 1000000);
      let h = 0;
      const str = String(s.runSeed) + ':' + eventKey;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return (Math.abs(h) % n + n) % n;
    }

      setMuted(m) {
        settings.mute = m;
        if (this.master) this.master.gain.value = m ? 0 : settings.volume;
        if (m) { if (this.bgmEl) this.bgmEl.volume = 0; }
        else { if (this.bgmEl) this.bgmEl.volume = this.bgmTargetVol; }
        saveSettings();
      },

      setVolume(v) {
        settings.volume = v;
        if (this.master && !settings.mute) this.master.gain.value = v;
        saveSettings();
      },

      _now() { return this.ctx ? this.ctx.currentTime : 0; },

      _noiseBuffer(duration) {
        const len = this.ctx.sampleRate * duration;
        const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        return buf;
      },

      startDrone() {
        if (!this.ctx) return;
        this.stopDrone();
        const g = this.ctx.createGain();
        g.gain.value = 0.035;
        const o1 = this.ctx.createOscillator();
        o1.type = 'sine';
        o1.frequency.value = 55;
        const o2 = this.ctx.createOscillator();
        o2.type = 'triangle';
        o2.frequency.value = 110;
        const lfo = this.ctx.createOscillator();
        lfo.type = 'sine';
        lfo.frequency.value = 0.07;
        const lfoGain = this.ctx.createGain();
        lfoGain.gain.value = 0.015;
        lfo.connect(lfoGain);
        lfoGain.connect(g.gain);
        o1.connect(g);
        o2.connect(g);
        g.connect(this.master);
        o1.start();
        o2.start();
        lfo.start();
        this.droneOsc = [o1, o2, lfo];
        this.droneGain = g;
      },

      stopDrone() {
        this.droneOsc.forEach(o => { try { o.stop(); o.disconnect(); } catch (e) {} });
        this.droneOsc = [];
        if (this.droneGain) { try { this.droneGain.disconnect(); } catch (e) {} this.droneGain = null; }
      },

      heartbeat(bpm) {
        if (!this.ctx) return;
        this.stopHeartbeat();
        const interval = 60 / Math.max(30, bpm);
        const beat = () => {
          if (!this.ctx) return;
          const t = this.ctx.currentTime;
          const o = this.ctx.createOscillator();
          o.type = 'sine';
          o.frequency.setValueAtTime(90, t);
          o.frequency.exponentialRampToValueAtTime(35, t + 0.18);
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.45, t + 0.02);
          g.gain.exponentialRampToValueAtTime(0.005, t + 0.22);
          o.connect(g).connect(this.master);
          o.start(t);
          o.stop(t + 0.25);
        };
        beat();
        this.heartbeatTimer = setInterval(beat, interval * 1000);
      },

      stopHeartbeat() {
        if (this.heartbeatTimer) { clearInterval(this.heartbeatTimer); this.heartbeatTimer = null; }
      },

      playTrainPass() {
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const dur = 6;
        // 低频震动
        const osc = this.ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(62, t);
        osc.frequency.linearRampToValueAtTime(42, t + dur);
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.22, t + 1.2);
        g.gain.linearRampToValueAtTime(0, t + dur);
        const f = this.ctx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.value = 180;
        osc.connect(f).connect(g).connect(this.master);
        osc.start(t);
        osc.stop(t + dur);
        // 金属摩擦
        const noise = this.ctx.createBufferSource();
        noise.buffer = this._noiseBuffer(dur);
        const nf = this.ctx.createBiquadFilter();
        nf.type = 'bandpass';
        nf.frequency.setValueAtTime(600, t);
        nf.frequency.linearRampToValueAtTime(2400, t + dur);
        nf.Q.value = 12;
        const ng = this.ctx.createGain();
        ng.gain.setValueAtTime(0, t);
        ng.gain.linearRampToValueAtTime(0.07, t + 0.6);
        ng.gain.linearRampToValueAtTime(0, t + dur);
        noise.connect(nf).connect(ng).connect(this.master);
        noise.start(t);
        noise.stop(t + dur);
        // 屏幕震动
        document.getElementById('game-container').classList.add('screen-shake');
        setTimeout(() => document.getElementById('game-container').classList.remove('screen-shake'), 450);
      },

      playSnowSteps(rate, count) {
        if (!this.ctx) return;
        rate = rate || 2.5;
        count = count || 8;
        const t0 = this.ctx.currentTime;
        for (let i = 0; i < count; i++) {
          const t = t0 + i / rate;
          const noise = this.ctx.createBufferSource();
          noise.buffer = this._noiseBuffer(0.08);
          const f = this.ctx.createBiquadFilter();
          f.type = 'highpass';
          f.frequency.value = 1200;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.12, t + 0.01);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
          noise.connect(f).connect(g).connect(this.master);
          noise.start(t);
          noise.stop(t + 0.08);
        }
      },

      playCreak() {
        if (!this.ctx) return;
        const t = this.ctx.currentTime;
        const dur = 1.4;
        const noise = this.ctx.createBufferSource();
        noise.buffer = this._noiseBuffer(dur);
        const f = this.ctx.createBiquadFilter();
        f.type = 'bandpass';
        f.frequency.setValueAtTime(300, t);
        f.frequency.exponentialRampToValueAtTime(1200, t + dur);
        f.Q.value = 5;
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.18, t + 0.1);
        g.gain.linearRampToValueAtTime(0, t + dur);
        noise.connect(f).connect(g).connect(this.master);
        noise.start(t);
        noise.stop(t + dur);
      },

      playNurseryFragment() {
        if (!this.ctx) return;
        const notes = [349.23, 392.00, 329.63, 293.66, 261.63]; // F4 G4 E4 D4 C4
        const t0 = this.ctx.currentTime;
        notes.forEach((freq, i) => {
          // 断续：随机跳过某些音符
          if (Math.random() < 0.25) return;
          const t = t0 + i * 0.55 + Math.random() * 0.15;
          const o = this.ctx.createOscillator();
          o.type = i % 2 === 0 ? 'sine' : 'triangle';
          o.frequency.value = freq;
          // 轻微反相/变速感通过 detune 与 gain 包络模拟
          o.detune.value = (Math.random() - 0.5) * 40;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.08, t + 0.05);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          o.connect(g).connect(this.master);
          o.start(t);
          o.stop(t + 0.4);
        });
      }
    };

    /* ============================================================
       存档与设置
       ============================================================ */
    function loadSettings() {
      try {
        const raw = localStorage.getItem(SETTINGS_KEY);
        if (raw) return Object.assign({ mute: false, volume: 0.6, speed: 1, bgmVolume: 0.35 }, JSON.parse(raw));
      } catch (e) {}
      return { mute: false, volume: 0.6, speed: 1, bgmVolume: 0.35 };
    }
    function saveSettings() {
      try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch (e) {}
    }
    function loadUnlocked() {
      try {
        const raw = localStorage.getItem(UNLOCKED_KEY);
        if (raw) return Object.assign(defaultUnlocked(), JSON.parse(raw));
      } catch (e) {}
      return defaultUnlocked();
    }
    function saveUnlocked() {
      try { localStorage.setItem(UNLOCKED_KEY, JSON.stringify(state.unlocked)); } catch (e) {}
    }
    function hasSave() {
      try { return !!localStorage.getItem(SAVE_KEY); } catch (e) { return false; }
    }
    function saveGame() {
      if (!currentRoute || !currentNodeId) return;
      try {
        const payload = {
          version: 1,
          route: currentRoute,
          node: currentNodeId,
          state: state
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
      } catch (e) {}
    }
    function loadGame() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (e) { return null; }
    }
    function deleteSaves() {
      try {
        localStorage.removeItem(SAVE_KEY);
        localStorage.removeItem(UNLOCKED_KEY);
        localStorage.removeItem(SETTINGS_KEY);
      } catch (e) {}
      settings = loadSettings();
      if (audio.master) audio.master.gain.value = settings.mute ? 0 : settings.volume;
      audio.setBgmVolume(settings.bgmVolume);
      state = defaultState();
      updateMenuButtons();
    }

    /* ============================================================
       UI  helpers
       ============================================================ */
    function $(id) { return document.getElementById(id); }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
      const target = $(id);
      if (target) target.classList.add('active');
    }

    function updateMenuButtons() {
      const has = hasSave();
      $('btn-continue-save').classList.toggle('hidden', !has);
      $('btn-delete-save').classList.toggle('hidden', !has);
    }

    function scrollTextToBottom() {
      const area = $('text-area');
      area.scrollTop = area.scrollHeight;
    }

    /* ============================================================
       视觉演出
       ============================================================ */
    function startSnow() {
      stopSnow();
      const layer = $('snow-layer');
      const create = () => {
        const el = document.createElement('div');
        el.className = 'snowflake';
        const size = Math.random() * 3 + 1;
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.animationDuration = (Math.random() * 4 + 4) + 's';
        el.style.opacity = Math.random() * 0.5 + 0.3;
        layer.appendChild(el);
        setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 9000);
      };
      // 初始批次
      for (let i = 0; i < 40; i++) setTimeout(create, Math.random() * 5000);
      snowTimer = setInterval(create, 250);
    }

    function stopSnow() {
      if (snowTimer) { clearInterval(snowTimer); snowTimer = null; }
      $('snow-layer').innerHTML = '';
    }

    function triggerFlash(type) {
      const layer = $('flash-layer');
      const el = document.createElement('div');
      el.className = 'flash-element';
      if (type === 'shadow') {
        el.classList.add('half-shadow');
      } else if (type === 'train') {
        el.classList.add('train-light');
      } else if (type === 'hand') {
        el.classList.add('handprint');
        el.innerHTML = '<svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg"><path d="M50 115 C30 115 20 95 25 75 C15 70 5 55 15 45 C20 40 30 45 35 55 C35 35 30 10 50 5 C70 10 65 35 65 55 C70 45 80 40 85 45 C95 55 85 70 75 75 C80 95 70 115 50 115Z" fill="#8B0000" opacity="0.85"/></svg>';
      } else if (type === 'silhouette') {
        el.classList.add('silhouette');
        el.innerHTML = '<svg viewBox="0 0 120 240" xmlns="http://www.w3.org/2000/svg"><path d="M60 20 C45 20 35 35 35 55 C35 70 42 82 50 88 L50 130 L35 130 L25 155 L45 155 L45 240 L75 240 L75 155 L95 155 L85 130 L70 130 L70 88 C78 82 85 70 85 55 C85 35 75 20 60 20Z" fill="#000" opacity="0.9"/></svg>';
      }
      // 随机位置微调
      if (type !== 'shadow' && type !== 'silhouette') {
        el.style.left = Math.random() * 80 + 10 + '%';
        el.style.top = Math.random() * 70 + 10 + '%';
      }
      layer.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 700);
    }

    function scheduleFlashes() {
      if (flashTimer) { clearTimeout(flashTimer); flashTimer = null; }
      function next() {
        const base = state.intensity === 'nightmare' ? 2000 : state.intensity === 'curse' ? 4000 : 8000;
        const delay = Math.max(1500, base - state.curse * 30 + Math.random() * 2000);
        flashTimer = setTimeout(() => {
          if (Math.random() > 0.65) { next(); return; }
          const r = Math.random();
          let type = 'shadow';
          if (r < 0.25) type = 'train';
          else if (r < 0.5) type = 'hand';
          else if (r < 0.75) type = 'silhouette';
          triggerFlash(type);
          if (type === 'train') audio.playTrainPass();
          next();
        }, delay);
      }
      next();
    }

    function stopFlashes() {
      if (flashTimer) { clearTimeout(flashTimer); flashTimer = null; }
      $('flash-layer').innerHTML = '';
    }

    function applyCurseVisuals() {
      const overlay = $('curse-overlay');
      overlay.style.opacity = Math.min(0.55, state.curse / 140).toFixed(3);
      if (state.curse > 40 || state.sanity < 30) {
        document.body.classList.add('curse-active');
      } else {
        document.body.classList.remove('curse-active');
      }
    }

    /* ============================================================
       文本推进引擎
       ============================================================ */
    function gotoNode(routeKey, nodeId, record = true) {
      const route = ROUTES[routeKey];
      if (!route) { console.error('未知路线', routeKey); return; }
      const node = route.nodes[nodeId];
      if (!node) { console.error('未知节点', nodeId); return; }

      currentRoute = routeKey;
      currentNodeId = nodeId;
      if (record) state.choices.push({ route: routeKey, node: nodeId, at: Date.now() });

      // 清理旧文本与选项
      clearChoiceTimer();
      if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
      $('text-stack').innerHTML = '';
      $('options-area').innerHTML = '';
      $('skip-hint').classList.add('hidden');

      // 节点进入效果
      if (node.onEnter) {
        try { node.onEnter(state); } catch (e) { console.error(e); }
      }
      if (node.curseChange) state.curse = Math.max(0, Math.min(100, state.curse + node.curseChange));
      if (node.sanityChange) state.sanity = Math.max(0, Math.min(100, state.sanity + node.sanityChange));

      updateHUD();
      applyCurseVisuals();
      saveGame();

      // 生成段落队列
      segmentQueue = (node.text || []).map(t => Object.assign({ speed: 40, pause: 350, effect: '' }, t));
      segmentIndex = 0;
      typing = true;
      typeNextSegment();
    }

    function typeNextSegment() {
      if (segmentIndex >= segmentQueue.length) {
        typing = false;
        $('skip-hint').classList.add('hidden');
        renderOptions();
        return;
      }
      const seg = segmentQueue[segmentIndex];
      const p = document.createElement('p');
      p.className = 'text-line';
      const span = document.createElement('span');
      span.className = 'text-body';
      if (seg.effect) {
        seg.effect.split(/\s+/).forEach(c => { if (c) span.classList.add(c); });
      }
      p.appendChild(span);
      $('text-stack').appendChild(p);

      const text = seg.content;
      let i = 0;
      const interval = Math.max(4, Math.floor(seg.speed / settings.speed));
      typing = true;
      $('skip-hint').classList.remove('hidden');

      function step() {
        if (i >= text.length) {
          segmentIndex++;
          typing = false;
          typingTimer = null;
          setTimeout(typeNextSegment, seg.pause);
          return;
        }
        span.textContent += text.charAt(i);
        i++;
        scrollTextToBottom();
        typingTimer = setTimeout(step, interval);
      }
      step();
    }

    function skipCurrentSegment() {
      if (!typing) {
        if (segmentIndex >= segmentQueue.length) renderOptions();
        return;
      }
      if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
      const seg = segmentQueue[segmentIndex];
      const lines = $('text-stack').querySelectorAll('p.text-line');
      const last = lines[lines.length - 1];
      if (last) {
        const span = last.querySelector('span.text-body');
        if (span) span.textContent = seg.content;
      }
      segmentIndex++;
      typing = false;
      setTimeout(typeNextSegment, seg.pause || 80);
    }

    function renderOptions() {
      const node = ROUTES[currentRoute].nodes[currentNodeId];
      const area = $('options-area');
      // 幂等保护：若选项已渲染则不重复
      if (area.children.length > 0 && typing === false) return;
      area.innerHTML = '';
      const opts = (node.options || []).filter(opt => !opt.condition || opt.condition(state));
      if (opts.length === 0) {
        const btn = document.createElement('button');
        btn.className = 'btn option-btn';
        btn.textContent = '（继续）';
        btn.onclick = () => transitionTo('__main__');
        area.appendChild(btn);
        return;
      }

      // 判断当前节点/选项是否限时
      let timed = node.timed || state.mode === 'survival' || state.intensity === 'nightmare';
      let timeMs = node.timer || (state.intensity === 'nightmare' ? 5000 : state.mode === 'survival' ? 8000 : 12000);
      if (state.intensity === 'narrative' && !node.timed) timed = false; // 叙事强度不强制限时，但显式限时节点仍生效

      opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'btn option-btn';
        btn.textContent = opt.text;
        btn.onclick = () => { clearChoiceTimer(); chooseOption(opt); };
        area.appendChild(btn);
      });

      if (timed && timeMs > 0) {
        const timerWrap = document.createElement('div');
        timerWrap.className = 'choice-timer';
        const bar = document.createElement('div');
        bar.className = 'choice-timer-bar';
        bar.style.animationDuration = timeMs + 'ms';
        timerWrap.appendChild(bar);
        area.insertBefore(timerWrap, area.firstChild);

        choiceTimer = setTimeout(() => {
          // 超时：执行默认选项或最后一个危险选项
          const auto = opts.find(o => o.default) || opts[opts.length - 1];
          chooseOption(auto);
        }, timeMs);
      }

      scrollTextToBottom();
    }

    function clearChoiceTimer() {
      if (choiceTimer) { clearTimeout(choiceTimer); choiceTimer = null; }
    }

    function chooseOption(opt) {
      if (opt.effect) {
        try { opt.effect(state); } catch (e) { console.error(e); }
      }
      updateHUD();
      applyCurseVisuals();
      saveGame();
      transitionTo(opt.target);
    }

    function transitionTo(target) {
      clearChoiceTimer();
      if (target === '__main__') {
        stopHeartbeatByRouteEnd();
        stopFlashes();
        stopSnow();
        audio.stopDrone();
        audio.resumeBgm();
        showScreen('main-menu');
        updateMenuButtons();
        return;
      }
      if (target === '__ending__') {
        // 结局屏由选项 effect 触发，直接清理现场即可
        stopHeartbeatByRouteEnd();
        stopFlashes();
        stopSnow();
        return;
      }
      if (!ROUTES[currentRoute].nodes[target]) {
        console.error('跳转目标不存在', target);
        return;
      }
      // 简单黑屏过渡：先遮罩再切节点
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;z-index:40;transition:opacity 0.3s;';
      document.body.appendChild(overlay);
      requestAnimationFrame(() => { overlay.style.opacity = '1'; });
      setTimeout(() => {
        gotoNode(currentRoute, target, true);
        overlay.style.opacity = '0';
        setTimeout(() => { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }, 350);
      }, 320);
    }

    function stopHeartbeatByRouteEnd() {
      audio.stopHeartbeat();
    }

    /* ============================================================
       HUD 与面板
       ============================================================ */
    function updateHUD() {
      const route = currentRoute ? ROUTES[currentRoute] : null;
      $('hud-char').textContent = route ? route.title : '';
      $('hud-chapter').textContent = state.chapter ? '第 ' + state.chapter + ' 章' : '';
      $('sanity-val').textContent = state.sanity;
      $('curse-val').textContent = state.curse;
      $('btn-clues').classList.toggle('hidden', state.mode !== 'reasoning');
    }

    function renderCluePanel() {
      const list = $('clue-list');
      list.innerHTML = '';
      if (state.clues.length === 0) {
        list.innerHTML = '<p style="color:#777">还没有收集到线索。</p>';
        return;
      }
      const groups = {};
      state.clues.forEach(c => {
        const t = CLUE_TYPES[c.type] || c.type;
        if (!groups[t]) groups[t] = [];
        groups[t].push(c);
      });
      for (const [type, items] of Object.entries(groups)) {
        const cat = document.createElement('div');
        cat.className = 'clue-category';
        cat.textContent = '【' + type + '】';
        list.appendChild(cat);
        items.forEach(c => {
          const div = document.createElement('div');
          div.className = 'clue-item';
          div.textContent = c.name;
          list.appendChild(div);
        });
      }
    }

    function showEnding(title, desc, unlockType, unlockName) {
      // 记录解锁
      if (unlockType === 'ending') unlockEnding(unlockName);
      else if (unlockType === 'death') unlockDeath(unlockName);
      else if (unlockType === 'song') unlockSong(unlockName);
      else if (unlockType === 'archive') unlockArchive(unlockName);

      $('ending-title').textContent = title;
      $('ending-desc').textContent = desc || '';
      const unlockMsg = unlockName ? '已解锁：' + unlockName : '';
      $('ending-unlock').textContent = unlockMsg;

      stopFlashes();
      stopSnow();
      audio.stopHeartbeat();
      audio.stopDrone();
      audio.stopBgm();
      showScreen('ending-screen');
    }

    function renderGallery() {
      const grid = $('gallery-grid');
      grid.innerHTML = '';
      const sections = [
        { title: '结局', list: state.unlocked.endings },
        { title: '死亡', list: state.unlocked.deaths },
        { title: '遭遇', list: state.unlocked.encounters || [] },
        { title: '童谣变体', list: state.unlocked.songVariants },
        { title: '真相档案', list: state.unlocked.archives }
      ];
      sections.forEach(sec => {
        const head = document.createElement('div');
        head.className = 'gallery-card';
        head.textContent = sec.title;
        grid.appendChild(head);
        if (sec.list.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'gallery-card';
          empty.textContent = '未收集';
          grid.appendChild(empty);
        } else {
          sec.list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'gallery-card unlocked';
            card.textContent = item;
            grid.appendChild(card);
          });
        }
      });
    }

    /* ============================================================
       设置与模式选择界面
       ============================================================ */
    function renderSetup() {
      let ngIndicator = $('ng-plus-indicator');
      if (!ngIndicator) {
        ngIndicator = document.createElement('div');
        ngIndicator.id = 'ng-plus-indicator';
        ngIndicator.style.cssText = 'text-align:center;color:#8B0000;font-size:0.9rem;letter-spacing:0.2em;margin-bottom:0.5rem;min-height:1.4em;';
        const panel = $('setup-panel');
        panel.insertBefore(ngIndicator, panel.firstChild);
      }
      ngIndicator.textContent = state.unlocked.newGamePlus ? '二周目模式 · 新的线索已解锁' : '';

      const charGrid = $('char-grid');
      charGrid.innerHTML = '';
      CHARACTERS.forEach(ch => {
        const locked = ch.lockKey && !state.unlocked.routes[ch.lockKey];
        const card = document.createElement('div');
        card.className = 'card' + (locked ? ' locked' : '') + (pendingConfig.char === ch.id ? ' selected' : '');
        card.innerHTML = '<div class="card-name">' + ch.name + '</div><div class="card-role">' + ch.role + '</div><div class="card-desc">' + ch.desc + '</div>';
        if (!locked) {
          card.onclick = () => { pendingConfig.char = ch.id; renderSetup(); };
        }
        charGrid.appendChild(card);
      });

      const intensityGrid = $('intensity-grid');
      intensityGrid.innerHTML = '';
      INTENSITIES.forEach(it => {
        const card = document.createElement('div');
        card.className = 'card' + (pendingConfig.intensity === it.id ? ' selected' : '');
        card.innerHTML = '<div class="card-name">' + it.name + '</div><div class="card-desc">' + it.desc + '</div>';
        card.onclick = () => { pendingConfig.intensity = it.id; renderSetup(); };
        intensityGrid.appendChild(card);
      });

      const modeGrid = $('mode-grid');
      modeGrid.innerHTML = '';
      PLAY_MODES.forEach(md => {
        const card = document.createElement('div');
        card.className = 'card' + (pendingConfig.mode === md.id ? ' selected' : '');
        card.innerHTML = '<div class="card-name">' + md.name + '</div><div class="card-desc">' + md.desc + '</div>';
        card.onclick = () => { pendingConfig.mode = md.id; renderSetup(); };
        modeGrid.appendChild(card);
      });

      $('btn-start').disabled = !pendingConfig.char;
    }

    function openSettings() {
      $('cb-mute').checked = settings.mute;
      $('range-volume').value = settings.volume;
      $('range-bgm').value = settings.bgmVolume;
      $('range-speed').value = settings.speed;
      $('settings-panel').classList.remove('hidden');
    }
    function closeSettings() {
      $('settings-panel').classList.add('hidden');
    }

    /* ============================================================
       开场警告
       ============================================================ */
    const WARNING_LINES = [
      '本作品包含校园霸凌、死亡、心理恐怖、尸体状态文字描写。\n未满 18 岁禁止游玩。',
      '如果你选择继续，就等于开始唱佐子的歌。',
      '听到这首歌的人，会被佐子找上。'
    ];

    function runWarning() {
      const el = $('warning-text');
      const actions = $('warning-actions');
      let lineIndex = 0;
      let charIndex = 0;
      let currentText = '';
      el.innerHTML = '';
      actions.classList.add('hidden');

      function nextLine() {
        if (lineIndex >= WARNING_LINES.length) {
          actions.classList.remove('hidden');
          return;
        }
        charIndex = 0;
        currentText = '';
        const p = document.createElement('p');
        if (lineIndex === 0) p.className = 'blood-rule';
        el.appendChild(p);
        typeChar();
      }

      function typeChar() {
        const line = WARNING_LINES[lineIndex];
        if (charIndex >= line.length) {
          lineIndex++;
          setTimeout(nextLine, 800);
          return;
        }
        const p = el.lastElementChild;
        // 处理换行
        if (line.charAt(charIndex) === '\n') {
          p.appendChild(document.createElement('br'));
        } else {
          p.appendChild(document.createTextNode(line.charAt(charIndex)));
        }
        charIndex++;
        setTimeout(typeChar, 42);
      }
      nextLine();
    }

    /* ============================================================
       初始化与事件绑定
       ============================================================ */
    function startNewGame() {
      if (!pendingConfig.char) return;
      state = defaultState();
      state.character = pendingConfig.char;
      state.intensity = pendingConfig.intensity;
      state.mode = pendingConfig.mode;
      state.runSeed = Date.now() + Math.floor(Math.random() * 1000000);
      currentRoute = pendingConfig.char;
      currentNodeId = ROUTES[pendingConfig.char].start;

      audio.init();
      audio.startDrone();
      if (state.intensity === 'nightmare') audio.heartbeat(90);
      else if (state.intensity === 'curse') audio.heartbeat(70);

      startSnow();
      scheduleFlashes();
      showScreen('game-screen');
      gotoNode(currentRoute, currentNodeId, false);
    }

    function continueGame() {
      const data = loadGame();
      if (!data) return;
      state = data.state;
      currentRoute = data.route;
      currentNodeId = data.node;

      // 以 localStorage 中最新的解锁数据为准，避免跨周目解锁丢失
      state.unlocked = loadUnlocked();
      // 兼容旧存档新增字段
      if (!state.runSeed) state.runSeed = Date.now() + Math.floor(Math.random() * 1000000);
      if (!state.unlocked.encounters) state.unlocked.encounters = [];
      if (state.unlocked.newGamePlus === undefined) state.unlocked.newGamePlus = false;
      state.newGamePlus = state.unlocked.newGamePlus;
      // 兜底缺失的进度字段，防止旧存档崩溃
      if (!state.clues) state.clues = [];
      if (!state.flags) state.flags = {};
      if (state.sanity === undefined) state.sanity = 100;
      if (state.curse === undefined) state.curse = 0;
      if (!state.choices) state.choices = [];
      if (state.chapter === undefined) state.chapter = 1;
      if (!state.intensity) state.intensity = 'narrative';
      if (!state.mode) state.mode = 'story';

      audio.init();
      audio.startDrone();
      if (state.curse > 40 || state.intensity === 'nightmare') audio.heartbeat(75 + state.curse * 0.3);

      startSnow();
      scheduleFlashes();
      showScreen('game-screen');
      gotoNode(currentRoute, currentNodeId, false);
    }

    function bindEvents() {
      // 警告屏
      $('btn-continue').onclick = () => {
        audio.init();
        audio.startDrone();
        audio.playNurseryFragment();
        audio.startBgm();
        showScreen('main-menu');
        updateMenuButtons();
      };
      $('btn-exit').onclick = () => {
        audio.stopDrone();
        audio.stopBgm();
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#050505;color:#555;font-family:serif;">已退出。请手动关闭窗口。</div>';
        try { window.close(); } catch (e) {}
      };

      // 主菜单
      $('btn-new-game').onclick = () => {
        pendingConfig = { char: null, intensity: 'narrative', mode: 'story' };
        renderSetup();
        showScreen('setup-screen');
      };
      $('btn-continue-save').onclick = continueGame;
      $('btn-settings').onclick = openSettings;
      $('btn-gallery').onclick = () => { renderGallery(); showScreen('gallery-screen'); };
      $('btn-delete-save').onclick = () => {
        if (confirm('确定删除所有存档、收集与设置？此操作不可恢复。')) {
          deleteSaves();
        }
      };

      // 设置
      $('cb-mute').onchange = (e) => audio.setMuted(e.target.checked);
      $('range-volume').oninput = (e) => audio.setVolume(parseFloat(e.target.value));
      $('range-bgm').oninput = (e) => { settings.bgmVolume = parseFloat(e.target.value); audio.setBgmVolume(settings.bgmVolume); saveSettings(); };
      $('range-speed').oninput = (e) => { settings.speed = parseFloat(e.target.value); saveSettings(); };
      $('btn-close-settings').onclick = closeSettings;

      // 角色选择
      $('btn-setup-back').onclick = () => showScreen('main-menu');
      $('btn-start').onclick = startNewGame;

      // 游戏屏交互
      $('game-screen').addEventListener('click', (e) => {
        if (e.target.closest('.btn') || e.target.closest('.overlay')) return;
        skipCurrentSegment();
      });
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && $('game-screen').classList.contains('active')) {
          e.preventDefault();
          skipCurrentSegment();
        }
      });

      // HUD 按钮
      $('btn-game-settings').onclick = openSettings;
      $('btn-clues').onclick = () => { renderCluePanel(); $('clue-panel').classList.remove('hidden'); };
      $('btn-close-clues').onclick = () => $('clue-panel').classList.add('hidden');

      // 图鉴返回
      $('btn-gallery-back').onclick = () => showScreen('main-menu');

      // 结局屏返回
      $('btn-ending-back').onclick = () => {
        showScreen('main-menu');
        updateMenuButtons();
        audio.resumeBgm();
      };
    }

    function init() {
      bindEvents();
      runWarning();
      // 如曾经静音则应用
      if (settings.mute) audio.setMuted(true);
      // 应用 BGM 音量设置
      audio.bgmTargetVol = settings.bgmVolume || 0.35;
      // 边缘日文文字轮换
      startEdgeTextCycle();
    }

    /* ============================================================
       边缘日文文字轮换
       ============================================================ */
    const EDGE_TEXTS = [
      '聞こえる…聞こえる…',
      '佐子が呼んでいる',
      '私はここにいる',
      '寒い…寒い…'
    ];
    let edgeTextIndex = 0;
    let edgeTextTimer = null;
    function startEdgeTextCycle() {
      if (edgeTextTimer) return;
      edgeTextTimer = setInterval(() => {
        edgeTextIndex = (edgeTextIndex + 1) % EDGE_TEXTS.length;
        const el = document.getElementById('edge-text');
        if (el && !el.dataset.locked) el.textContent = EDGE_TEXTS[edgeTextIndex];
      }, 8000);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
